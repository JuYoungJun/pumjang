<div class="modal micromodal-slide reservation-modal" id="reservation-modal" aria-hidden="true">
    <div class="modal__overlay reservation-modal__overlay" tabindex="-1" data-micromodal-close>
        <div class="modal__container reservation-modal__container" role="dialog" aria-modal="true"
            aria-labelledby="reservation-modal-title" aria-describedby="reservation-modal-desc">

            <button class="reservation-modal__close" aria-label="닫기" data-micromodal-close type="button">
                <span></span>
                <span></span>
            </button>

            <div class="reservation-modal__topline"></div>
            <div class="reservation-modal__eyebrow">RESERVATION GUIDE</div>

            <h3 class="reservation-modal__title" id="reservation-modal-title">예약 안내</h3>

            <p class="reservation-modal__desc" id="reservation-modal-desc">
                원하시는 방식으로 편하게 예약 또는 문의하실 수 있습니다.
            </p>

            <div class="reservation-modal__branch-card">
                <div class="reservation-modal__branch-label">BRANCH</div>
                <div class="reservation-modal__branch" id="reservationModalBranch">품장 지점</div>
            </div>

            <p class="reservation-modal__note" id="reservationModalNote">
                해당 지점에 맞는 예약 방법을 안내해드릴게요.
            </p>

            <div class="reservation-modal__actions">
                <a href="#" class="reservation-modal__button reservation-modal__button--primary"
                    id="reservationPrimaryButton">
                    예약하기
                </a>

                <a href="#" class="reservation-modal__button reservation-modal__button--ghost"
                    id="reservationSecondaryButton">
                    문의하기
                </a>
            </div>
        </div>
    </div>
</div>
