<!-- 가까운 매장 찾기 -->
<div class="modal micromodal-slide quick-modal" id="store-finder-modal" aria-hidden="true">
    <div class="modal__overlay quick-modal__overlay" tabindex="-1" data-micromodal-close>
        <div class="modal__container quick-modal__container" role="dialog" aria-modal="true"
            aria-labelledby="store-finder-title" aria-describedby="store-finder-desc">

            <button class="quick-modal__close" type="button" aria-label="닫기" data-micromodal-close>
                <span></span>
                <span></span>
            </button>

            <div class="quick-modal__eyebrow">STORE GUIDE</div>
            <h3 class="quick-modal__title" id="store-finder-title">방문하실 매장을 선택해주세요</h3>
            <p class="quick-modal__desc" id="store-finder-desc">
                내 위치로 더 가까운 매장을 찾거나,<br>
                원하는 지점을 바로 선택할 수 있어요.
            </p>

            <div class="quick-modal__list">
                <button type="button" class="quick-card quick-card--primary" id="findNearestStore">
                    <div class="quick-card__head">
                        <div class="quick-card__title">내 위치로 가까운 매장 찾기</div>
                        <span class="quick-card__badge">추천</span>
                    </div>
                    <div class="quick-card__body">
                        현재 위치를 기준으로 나주점과 을왕리점 중 더 가까운 매장을 안내해드립니다.
                    </div>
                </button>

                <button type="button" class="quick-card" data-store-map="naju">
                    <div class="quick-card__head">
                        <div class="quick-card__title">나주점</div>
                        <span class="quick-card__badge quick-card__badge--line">전남</span>
                    </div>
                    <div class="quick-card__body">
                        전남 나주시 노안면 건재로 524-11
                    </div>
                </button>

                <button type="button" class="quick-card" data-store-map="eulwang">
                    <div class="quick-card__head">
                        <div class="quick-card__title">을왕리점</div>
                        <span class="quick-card__badge quick-card__badge--line">인천</span>
                    </div>
                    <div class="quick-card__body">
                        인천 중구 용유서로 402-11 1동 1층, 2층, 3층
                    </div>
                </button>
            </div>

            <div class="quick-result" id="nearestStoreResult"></div>
        </div>
    </div>
</div>

<!-- 실시간 예약하기 -->
<div class="modal micromodal-slide quick-modal" id="booking-entry-modal" aria-hidden="true">
    <div class="modal__overlay quick-modal__overlay" tabindex="-1" data-micromodal-close>
        <div class="modal__container quick-modal__container" role="dialog" aria-modal="true"
            aria-labelledby="booking-entry-title" aria-describedby="booking-entry-desc">

            <button class="quick-modal__close" type="button" aria-label="닫기" data-micromodal-close>
                <span></span>
                <span></span>
            </button>

            <div class="quick-modal__eyebrow">BOOKING GUIDE</div>
            <h3 class="quick-modal__title" id="booking-entry-title">예약하실 매장을 선택해주세요</h3>
            <p class="quick-modal__desc" id="booking-entry-desc">
                지점마다 예약 방식이 달라요.<br>
                편한 방법으로 바로 연결해드릴게요.
            </p>

            <div class="quick-modal__list">
                <div class="quick-branch-card">
                    <div class="quick-branch-card__top">
                        <div>
                            <div class="quick-branch-card__name">나주점</div>
                            <div class="quick-branch-card__meta">전화 예약 전용</div>
                        </div>
                        <span class="quick-branch-card__tag">전남</span>
                    </div>

                    <div class="quick-branch-card__actions">
                        <a href="tel:061-123-4567" class="quick-branch-card__btn quick-branch-card__btn--primary">
                            전화 예약하기
                        </a>
                        <button type="button" class="quick-branch-card__btn quick-branch-card__btn--ghost"
                            data-toggle-booking-guide="naju">
                            예약 안내 보기
                        </button>
                    </div>

                    <div class="quick-branch-guide" id="bookingGuide-naju" hidden>
                        <p class="quick-branch-guide__text">
                            나주점은 전화 예약으로 안내해드리고 있습니다.<br>
                            방문 날짜, 시간, 인원을 말씀해주시면 빠르게 도와드릴게요.
                        </p>
                        <div class="quick-branch-guide__phone">예약 문의 061-123-4567</div>
                    </div>
                </div>

                <div class="quick-branch-card">
                    <div class="quick-branch-card__top">
                        <div>
                            <div class="quick-branch-card__name">을왕리점</div>
                            <div class="quick-branch-card__meta">네이버 예약 / 전화 문의</div>
                        </div>
                        <span class="quick-branch-card__tag">인천</span>
                    </div>

                    <div class="quick-branch-card__actions">
                        <a href="https://m.booking.naver.com/booking/6/bizes/1484723/items/7026688?area=bmp&lang=ko&map-search=1&service-target=map-pc&theme=place"
                            target="_blank" rel="noopener"
                            class="quick-branch-card__btn quick-branch-card__btn--primary">
                            네이버 예약하기
                        </a>
                        <a href="tel:032-751-1239" class="quick-branch-card__btn quick-branch-card__btn--ghost">
                            전화 문의하기
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
